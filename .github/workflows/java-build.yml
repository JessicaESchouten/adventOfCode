name: Java CI with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    {}

jobs:
  build:
    name: java-build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'
    - name: Make mvnw executable
      run: chmod +x mvnw
    - name: Build and test with Maven
      run: ./mvnw clean verify
